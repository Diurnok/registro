<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Innovador</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: #f8fafc;
        }

        /* Esferas decorativas animadas de fondo */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.3;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .registro-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        /* Efecto de etiqueta flotante */
        .input-group input {
            width: 100%;
            padding: 12px 0;
            font-size: 1rem;
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 2px solid #334155;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 12px;
            left: 0;
            color: #94a3b8;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -12px;
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: bold;
        }

        .input-group input:focus {
            border-bottom-color: var(--primary);
        }

        /* Grid para Nombre y Apellido */
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
        }

        /* Efecto de brillo al pasar el mouse */
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>

<div class="registro-card">
    <h2>Crea tu perfil</h2>
    <form>
        <div class="row">
            <div class="input-group">
                <input type="text" id="nombre" required="">
                <label>Nombre</label>
            </div>
            <div class="input-group">
                <input type="text" id="apellido" required="">

            </div>
        </div>

        <div class="input-group">
            <input type="text" id="cedula" name="cedula" required="">

        </div>

        <div class="input-group">
            <input type="tel" id="telefono" required="">
            <label>Teléfono</label>
        </div>

        <div class="input-group">
            <input type="email" id="email" required="">
            <label>Correo Electrónico</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" required="">
            <label>Contraseña</label>
        </div>

        <button type="submit" class="btn-submit">FINALIZAR REGISTRO</button>

        <p class="footer-text">
            ¿Ya tienes cuenta? <a href="https://unexcaproyectos.byethost4.com/?i=1#">Inicia Sesión</a>
        </p>
    </form>
