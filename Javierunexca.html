
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #141322;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            gap: 30px;
        }

        .container {
            background-color: #172B1C;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            transition: all 0.5s ease;
        }

        .container.secret-card {
            background-color: #fff9db;
            border: 2px dashed #f59f00;
            display: none;
        }

        h2 {
            text-align: center;
            color: #27814d;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #007BFF;
        }

        .btn {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-submit {
            background-color: #007BFF;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }

        .btn-success {
            background-color: #4CAF50;
        }

        .btn-success:hover {
            background-color: #439a46;
        }

        .btn-secret {
            background-color: #f59f00;
        }
        
        .btn-secret:hover {
            background-color: #e69100;
        }

        .resultado {
            margin-top: 15px;
            padding: 10px;
            background-color: #e8f5e9;
            color: #2e7d32;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Usuario</h2>
    
    <form action="file:///C:/Users/javie/Desktop/Index.html#" method="POST" onsubmit="return validarContraseñas()">
        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Ingresa tu nombre" required="">
        </div>

        <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Ingresa tu apellido" required="">
        </div>

        <div class="form-group">
            <label for="cedula">Cédula de Identidad</label>
            <input type="text" id="cedula" pattern="[0-9]{6,9}" title="Solo números" placeholder="Ej: 25123456" required="">
        </div>

        <div class="form-group">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" placeholder="ejemplo@correo.com" required="">
        </div>

        <div class="form-group">
            <label for="celular">Número de Celular</label>
            <input type="tel" id="celular" placeholder="Ej: 04121234567" required="">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Crea una contraseña" required="">
        </div>

        <div class="form-group">
            <label for="confirm_password">Verificación de Contraseña</label>
            <input type="password" id="confirm_password" placeholder="Repite tu contraseña" required="">
        </div>

        <button type="submit" class="btn btn-submit">Registrarse</button>
    </form>
</div>


<div class="container">
    <h2>Suma de números</h2>     
    <div class="form-group">
        <input type="number" id="num1" placeholder="Ej: 5" required="">
    </div>

    <div class="form-group">
        <input type="number" id="num2" placeholder="Ej: 5" required="">
    </div>

    <button type="button" class="btn btn-success" onclick="calcularSuma()">Calcular suma</button>

    <div id="resultadoSuma" class="resultado"></div>
</div>


<div id="tarjetaSecreta" class="container secret-card">
    <h2>🔑 Validación Secreta</h2>
    <p style="text-align: center; font-size: 13px; color: #705d00; margin-bottom: 15px;">
        Has desbloqueado el módulo de alta seguridad. Por favor, configura tu pregunta de recuperación.
    </p>

    <form action="file:///C:/Users/javie/Desktop/Index.html#" method="POST" onsubmit="return validarSecreto()">
        <div class="form-group">
            <label for="pregunta">Selecciona una pregunta de seguridad</label>
            <select id="pregunta" required="">
                <option value="" disabled="" selected="">-- Elige una opción --</option>
                <option value="1">¿Cuál fue el nombre de tu primera mascota?</option>
                <option value="2">¿En qué ciudad nacieron tus padres?</option>
                <option value="3">¿Cuál es tu libro o película favorita?</option>
            </select>
        </div>

        <div class="form-group">
            <label for="respuestaSecreta">Respuesta de seguridad</label>
            <input type="text" id="respuestaSecreta" placeholder="Escribe tu respuesta secreta aquí" required="">
        </div>

        <button type="submit" class="btn btn-secret">Guardar Validación Secreta</button>
    </form>
</div>


<script>
    function validarContraseñas() {
        const pass = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirm_password').value;

        if (pass !== confirmPass) {
            alert("Las contraseñas no coinciden.");
            return false;
        }
        alert("¡Registro enviado con éxito!");
        return true;
    }

    function calcularSuma() {
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        const contenedorResultado = document.getElementById('resultadoSuma');
        const tarjetaSecreta = document.getElementById('tarjetaSecreta');

        if (isNaN(n1) || isNaN(n2)) {
            alert("Por favor, ingresa ambos números.");
            return;
        }

        const suma = n1 + n2;
        contenedorResultado.textContent = `El resultado es: ${suma}`;
        contenedorResultado.style.display = "block";
      
        if (suma === 10) {
            tarjetaSecreta.style.display = "block";
           
            tarjetaSecreta.scrollIntoView({ behavior: 'smooth' });
        } else {
            tarjetaSecreta.style.display = "none";
        }
    }
    function validarSecreto() {
        alert("🔒 Pregunta de seguridad configurada correctamente.");
        return true;
    }
</script>



</body></html>
